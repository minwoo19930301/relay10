name: Reproducible bug
description: Report a Relay10 failure with enough evidence to reproduce it.
title: "bug: "
body:
  - type: markdown
    attributes:
      value: Thanks for helping make Relay10 more reliable. Remove credentials and private data from every artifact.
  - type: textarea
    id: outcome
    attributes:
      label: Expected and actual outcome
      description: What did you expect, and what happened instead?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Include exact commands, a small fixture or public repository, and the first failing step.
      placeholder: |
        r10 doctor
        r10 route "..." --json
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Relay10 commit or version
      placeholder: v0.1.1 or a commit SHA
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Node version, Codex CLI version, and relevant sanitized configuration.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Exit code, stderr, run ID, report hash, or artifact path. Do not paste secrets.
    validations:
      required: true
  - type: checkboxes
    id: checks
    attributes:
      label: Safety check
      options:
        - label: I removed credentials, personal data, and private repository content.
          required: true
        - label: I checked for an existing issue describing the same failure.
          required: true
